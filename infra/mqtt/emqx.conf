## ATS — EMQX geliştirme yapılandırması
## Üretimde TLS sertifikaları ve güçlü parolalar kullanın.

node {
  name = "ats-emqx"
  cookie = "ats_emqx_cookie_change_in_prod"
}

listeners.tcp.default {
  bind = "0.0.0.0:1883"
  max_connections = 1024000
}

listeners.ssl.default {
  bind = "0.0.0.0:8883"
  max_connections = 512000
  ssl_options {
    verify = verify_none
  }
}

mqtt {
  max_packet_size = 4MB
  max_qos_allowed = 2
  retain_available = true
}

authorization {
  no_match = deny
  deny_action = ignore
  sources = [
    {
      type = file
      enable = true
    }
  ]
}

# Varsayılan: dosya tabanlı ACL (infra/mqtt/acl.conf mount edilebilir)
# Üretimde EMQX Dashboard veya PostgreSQL auth kullanın.
