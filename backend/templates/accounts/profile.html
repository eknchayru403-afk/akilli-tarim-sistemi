{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Profil{% endblock %}
{% block page_title %}Profil Bilgilerim{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header">
                <i class="bi bi-person-fill me-2"></i>Profil Bilgileri
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-primary mt-3">
                        <i class="bi bi-check-lg me-1"></i>Kaydet
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
