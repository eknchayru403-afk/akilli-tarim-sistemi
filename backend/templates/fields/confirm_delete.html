{% extends 'base.html' %}

{% block title %}Tarla Sil{% endblock %}
{% block page_title %}Tarla Sil{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card border-danger">
            <div class="card-header text-danger">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>Tarlayı Sil
            </div>
            <div class="card-body text-center">
                <i class="bi bi-trash" style="font-size: 3rem; color: var(--danger);"></i>
                <h5 class="mt-3">{{ field.name }}</h5>
                <p class="text-muted">Bu tarla ve tüm analizleri kalıcı olarak silinecek. Bu işlem geri alınamaz.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2 justify-content-center">
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash me-1"></i>Evet, Sil
                        </button>
                        <a href="{% url 'fields:detail' field.pk %}" class="btn btn-outline-secondary">İptal</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
